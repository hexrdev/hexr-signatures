name: release

# Tag-triggered release per HEXR_SDK_OVERHAUL_TECH_SPEC.md §21.4.3 + §21.4.7.
#
# When a CalVer tag (YYYY.MM.PATCH) is pushed, this workflow:
#   1. Builds packs.tar.gz from packs/
#   2. Computes SHA-256
#   3. Cosign keyless signs the tarball via Sigstore + OIDC + Fulcio
#      (no long-lived signing key — the Fulcio cert binds to THIS workflow's
#      OIDC token, and the SDK's update.py pins that exact identity)
#   4. Generates a SLSA v1.0 provenance attestation
#   5. Uploads tarball + .sigstore.json + .intoto.jsonl to GCS via WIF
#   6. Atomically writes latest.json LAST so clients never see a pointer to a
#      not-yet-uploaded artifact (§21.4.7)
#
# Trust root pinned in `hexr/sdk/python/src/hexr/cli/update.py`:
#   identity regex: ^https://github\.com/hexrdev/hexr-signatures/\.github/workflows/release\.yml@refs/tags/.+$
#   oidc issuer:    https://token.actions.githubusercontent.com
#
# Repository variables required (set via `gh variable set`):
#   HEXR_GCP_WIF_PROVIDER  — projects/<num>/locations/global/workloadIdentityPools/<pool>/providers/<provider>
#   HEXR_GCP_RELEASER_SA   — hexr-signatures-releaser@hexr-cloud-prod.iam.gserviceaccount.com
#   HEXR_GCS_BUCKET        — hexr-signatures-prod

on:
  push:
    tags:
      - "20[2-9][0-9].[0-1][0-9].[0-9]+"   # 2026.06.0 etc.

permissions:
  contents: read
  id-token: write       # required: OIDC token for Sigstore + GCP WIF
  attestations: write  # required: actions/attest-build-provenance@v1 writes SLSA provenance via the GitHub Attestations API

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag matches CalVer
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! echo "$tag" | grep -Eq '^20[2-9][0-9]\.(0[1-9]|1[0-2])\.[0-9]+$'; then
            echo "::error::tag '$tag' is not CalVer YYYY.MM.PATCH"
            exit 1
          fi
          echo "VERSION=$tag" >> "$GITHUB_ENV"

      - name: Build tarball
        run: |
          tar -C packs -czf "hexr-signatures-${VERSION}.tar.gz" frameworks patterns
          ls -la "hexr-signatures-${VERSION}.tar.gz"

      - name: Compute SHA-256 + size
        id: hash
        run: |
          sha=$(sha256sum "hexr-signatures-${VERSION}.tar.gz" | awk '{print $1}')
          size=$(stat -c%s "hexr-signatures-${VERSION}.tar.gz")
          echo "sha256=$sha"   >> "$GITHUB_OUTPUT"
          echo "size=$size"    >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sigstore keyless sign-blob (modern bundle format)
        env:
          COSIGN_YES: "true"
        run: |
          # --new-bundle-format emits the Sigstore Bundle v0.3 protobuf JSON
          # that sigstore-python's `Bundle.from_json()` expects. Without
          # this flag, cosign emits its legacy `{base64Signature, cert}`
          # format which the SDK rejects as "unsupported bundle format".
          # Requires cosign >= 2.5.0.
          cosign sign-blob \
            --new-bundle-format \
            --bundle "hexr-signatures-${VERSION}.tar.gz.sigstore.json" \
            "hexr-signatures-${VERSION}.tar.gz"
          # Also emit detached .sig + .crt for back-compat with the SDK's
          # detached-format path (update.py supports both).
          cosign sign-blob \
            --output-signature   "hexr-signatures-${VERSION}.tar.gz.sig" \
            --output-certificate "hexr-signatures-${VERSION}.tar.gz.crt" \
            "hexr-signatures-${VERSION}.tar.gz"

      - name: Verify locally before publish (belt + braces)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign verify-blob \
            --bundle "hexr-signatures-${VERSION}.tar.gz.sigstore.json" \
            --certificate-identity-regexp "^https://github\\.com/hexrdev/hexr-signatures/\\.github/workflows/release\\.yml@refs/tags/.+$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "hexr-signatures-${VERSION}.tar.gz"

      - name: SLSA v1.0 provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: hexr-signatures-${{ env.VERSION }}.tar.gz
        # The generated attestation is fetched from the GitHub attestations
        # API by the next step and uploaded alongside the artifact.

      - name: Download SLSA attestation as .intoto.jsonl
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh attestation download \
            "hexr-signatures-${VERSION}.tar.gz" \
            --repo "${GITHUB_REPOSITORY}" \
            --predicate-type "https://slsa.dev/provenance/v1" \
            > "hexr-signatures-${VERSION}.intoto.jsonl"

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.HEXR_GCP_WIF_PROVIDER }}
          service_account: ${{ vars.HEXR_GCP_RELEASER_SA }}

      - name: Upload tarball + signatures + attestation (NOT latest.json yet)
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: .
          destination: ${{ vars.HEXR_GCS_BUCKET }}/v/${{ env.VERSION }}/
          glob: "hexr-signatures-${{ env.VERSION }}.*"
          parent: false
          headers: |-
            content-type: application/octet-stream
            cache-control: public, max-age=31536000, immutable

      - name: Write latest.json (atomic LAST step)
        run: |
          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "released_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "tarball_url": "https://signatures.hexr.cloud/v/${VERSION}/hexr-signatures-${VERSION}.tar.gz",
            "sha256": "${{ steps.hash.outputs.sha256 }}",
            "size_bytes": ${{ steps.hash.outputs.size }},
            "min_sdk": "0.5.6",
            "max_sdk": null,
            "signed_by": "cosign-keyless",
            "fulcio_subject": "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@refs/tags/${VERSION}",
            "rekor_log_index": null
          }
          EOF
          cat latest.json

      - name: Upload latest.json (small cache, atomic pointer swap)
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: latest.json
          destination: ${{ vars.HEXR_GCS_BUCKET }}/
          parent: false
          headers: |-
            content-type: application/json
            cache-control: public, max-age=300
